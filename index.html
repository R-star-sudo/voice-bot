<!DOCTYPE html>
<html>
<head>
  <title>AI Voice Interview Bot</title>

  <!-- Important for mobile responsiveness -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    
    <div class="header">
      <h1>🎤 AI Interview Bot</h1>
      <p>Speak naturally. Get confident answers.</p>
    </div>

    <div class="chat-box">
      <div class="chat user">
        <span id="userText">Say something...</span>
      </div>

      <div class="chat bot">
        <span id="botText">Waiting for your question...</span>
      </div>
    </div>

    <button class="talk-btn" onclick="startListening()">
      🎙 Start Talking
    </button>

  </div>

  <script src="script.js"></script>
</body>
</html>
