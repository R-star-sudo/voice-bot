<!DOCTYPE html>
<html>
<head>
  <title>AI Voice Interview Bot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <header class="header">
      <h1>🎤 AI Interview Bot</h1>
      <p>Speak naturally. Get confident answers.</p>
    </header>

    <main class="chat-area" id="chatBox">
      <div class="chat bot">
        Waiting for your question...
      </div>

      <div class="chat bot hidden" id="typing">
        🤖 Bot is thinking...
      </div>
    </main>

    <footer class="controls">
      <button class="talk-btn" onclick="startListening()">
        <span class="mic-icon">🎙</span>
        <span id="btnText">Start Talking</span>
      </button>

      <div class="wave hidden" id="wave">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
